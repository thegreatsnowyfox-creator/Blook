// Search Engine

document.getElementById('count').textContent = questions.length + ' questions loaded';

function search() {
    var input = document.getElementById('searchInput');
    var query = input.value.toLowerCase().trim();
    var resultsDiv = document.getElementById('results');
    var statsDiv = document.getElementById('stats');
    
    if (query.length < 2) {
        resultsDiv.innerHTML = '<div class="no-match">Type at least 2 characters to search</div>';
        statsDiv.textContent = '';
        return;
    }
    
    var matches = [];
    for (var i = 0; i < questions.length; i++) {
        var question = questions[i][0].toLowerCase();
        if (question.indexOf(query) !== -1) {
            matches.push(questions[i]);
        }
    }
    
    if (matches.length === 0) {
        resultsDiv.innerHTML = '<div class="no-match">❌ No matches found for "' + input.value + '"</div>';
        statsDiv.textContent = '';
        return;
    }
    
    var html = '';
    var maxShow = Math.min(matches.length, 30);
    for (var j = 0; j < maxShow; j++) {
        html += '<div class="result">';
        html += '<div class="q">' + matches[j][0] + '</div>';
        html += '<div class="a">' + matches[j][1] + '</div>';
        html += '</div>';
    }
    
    if (matches.length > 30) {
        html += '<div class="no-match">Showing 30 of ' + matches.length + ' matches. Refine your search.</div>';
    }
    
    resultsDiv.innerHTML = html;
    statsDiv.textContent = 'Found ' + matches.length + ' match(es)';
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('results').innerHTML = '<div class="no-match">Type at least 2 characters to search</div>';
    document.getElementById('stats').textContent = '';
    document.getElementById('searchInput').focus();
}

// Initial state
document.getElementById('results').innerHTML = '<div class="no-match">Type at least 2 characters to search</div>';
